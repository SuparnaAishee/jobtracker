services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobtrackr-api
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Postgres: "Host=${SUPABASE_DB_HOST};Port=${SUPABASE_DB_PORT};Database=${SUPABASE_DB_NAME};Username=${SUPABASE_DB_USER};Password=${SUPABASE_DB_PASSWORD};SSL Mode=Require;Trust Server Certificate=true;Pooling=true;Maximum Pool Size=20"
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_IN_MINUTES}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      Gemini__Model: ${GEMINI_MODEL}
      Gemini__MaxOutputTokens: ${GEMINI_MAX_OUTPUT_TOKENS}
      Gemini__Temperature: ${GEMINI_TEMPERATURE}
      Storage__Root: ${STORAGE_ROOT}
    volumes:
      - jobtrackr-uploads:${STORAGE_ROOT}
    ports:
      - "${API_PORT}:8080"

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: jobtrackr-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT}:80"

volumes:
  jobtrackr-uploads:
