resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SignalR / WebSocket hub. Must come before the generic /api/ block so the
    # WebSocket Upgrade headers are applied.
    location /hubs/ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # API reverse proxy for local Docker Compose. On Render the React app
    # bypasses this entirely and calls the API URL directly via VITE_API_URL.
    location /api/ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api/health;
    }

    location /hangfire {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — every other path serves index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed assets, no-cache for index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
